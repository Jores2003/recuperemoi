<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les dons disponibles</title>

  <style>
    :root {
      --primary: #1f7a8c;
      --primary-light: #e3f2f5;
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --text-main: #222;
      --text-muted: #666;
      --shadow-soft: 0 8px 20px rgba(0,0,0,0.06);
      --radius-card: 14px;
      --radius-img: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text-main);
    }

    h1 {
      text-align: center;
      margin: 0 0 10px 0;
      font-size: 26px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 24px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Barre de filtres */
    .filters-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .filters-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .filters-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .chip {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    select {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #ddd;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
    }

    /* Grille des dons */
    #donations {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .don-card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      padding: 14px;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .don-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.08);
    }

    .don-photo-wrapper {
      position: relative;
      border-radius: var(--radius-img);
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .don-photo {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease;
    }

    .don-photo-wrapper:hover .don-photo {
      transform: scale(1.03);
    }

    .photo-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 999px;
    }

    .don-card h3 {
      margin: 4px 0 6px 0;
      font-size: 17px;
    }

    .don-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .don-meta span {
      display: inline-block;
      margin-right: 8px;
    }

    .don-card p {
      margin: 4px 0;
      font-size: 13px;
    }

    .don-actions {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      padding: 7px 12px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: #155a66;
    }

    .btn-ghost {
      background: transparent;
      color: var(--primary);
    }

    .btn-ghost:hover {
      background: var(--primary-light);
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
    }

    .pagination button {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }

    .pagination button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .pagination span {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: #fff;
      border-radius: 16px;
      max-width: 720px;
      width: 95%;
      max-height: 90vh;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
    }

    .modal-close {
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
    }

    .modal-body {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
      gap: 12px;
      padding: 12px 16px 16px 16px;
    }

    @media (max-width: 700px) {
      .modal-body {
        grid-template-columns: 1fr;
      }
    }

    /* Carrousel */
    .carousel {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    .carousel img {
      width: 100%;
      height: 320px;
      object-fit: contain;
      background: #000;
    }

    .carousel-nav {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      transform: translateY(-50%);
      padding: 0 8px;
    }

    .carousel-btn {
      border: none;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border-radius: 999px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .carousel-indicator {
      position: absolute;
      bottom: 8px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 999px;
    }

    .modal-details p {
      margin: 4px 0;
      font-size: 13px;
    }

    .modal-details .label {
      font-weight: 600;
    }

    .modal-footer {
      padding: 10px 16px 14px 16px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
  </style>
</head>

<body>

  <h1>Les dons disponibles</h1>
  <p class="subtitle">Découvrez les objets donnés près de chez vous, filtrés par type, ville et état.</p>

  <!-- Filtres -->
  <div class="filters-bar">
    <div class="filters-group">
      <span class="filters-label">Type :</span>
      <button class="chip active" data-type="all">Tous</button>
      <button class="chip" data-type="meuble">Meubles</button>
      <button class="chip" data-type="jouet">Jouets</button>
      <button class="chip" data-type="textile">Textile</button>
      <button class="chip" data-type="électroménager">Électroménager</button>
      <button class="chip" data-type="déco">Décoration</button>
      <button class="chip" data-type="autre">Autre</button>
    </div>

    <div class="filters-group">
      <span class="filters-label">Ville :</span>
      <select id="filterCity">
        <option value="all">Toutes</option>
      </select>
    </div>

    <div class="filters-group">
      <span class="filters-label">État :</span>
      <select id="filterState">
        <option value="all">Tous</option>
      </select>
    </div>
  </div>

  <!-- Grille des dons -->
  <div id="donations"></div>

  <!-- Pagination -->
  <div class="pagination">
    <button id="prevPage">&lt;</button>
    <span id="pageInfo">Page 1</span>
    <button id="nextPage">&gt;</button>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Détail du don</div>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="carousel">
          <img id="modalImage" src="" alt="Photo du don">
          <div class="carousel-nav">
            <button class="carousel-btn" id="prevPhoto">&#8249;</button>
            <button class="carousel-btn" id="nextPhoto">&#8250;</button>
          </div>
          <div class="carousel-indicator" id="photoIndicator">1 / 1</div>
        </div>
        <div class="modal-details" id="modalDetails">
          <!-- rempli en JS -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modalContact">Contacter le donneur</button>
        <button class="btn btn-primary" id="modalCloseBottom">Fermer</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz3_MLXMxqpEnmYQExnE9dizJYx15eBseREFSldQW2LAg5ostMvmqh1_gncntfMx1c1bw/exec";

    let allDonations = [];
    let filteredDonations = [];
    let currentType = "all";
    let currentCity = "all";
    let currentState = "all";
    let currentPage = 1;
    const pageSize = 8;

    // Modal state
    let currentPhotos = [];
    let currentPhotoIndex = 0;
    let currentContact = "";

    // DOM refs
    const donationsContainer = document.getElementById("donations");
    const filterCity = document.getElementById("filterCity");
    const filterState = document.getElementById("filterState");
    const pageInfo = document.getElementById("pageInfo");
    const prevPageBtn = document.getElementById("prevPage");
    const nextPageBtn = document.getElementById("nextPage");

    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modalImage = document.getElementById("modalImage");
    const photoIndicator = document.getElementById("photoIndicator");
    const modalDetails = document.getElementById("modalDetails");
    const modalClose = document.getElementById("modalClose");
    const modalCloseBottom = document.getElementById("modalCloseBottom");
    const prevPhotoBtn = document.getElementById("prevPhoto");
    const nextPhotoBtn = document.getElementById("nextPhoto");
    const modalContactBtn = document.getElementById("modalContact");

    // Charger les données
    fetch(API_URL)
      .then(response => response.json())
      .then(data => {
        // Trier par date (plus récent en premier)
        allDonations = data.sort((a, b) => new Date(b["Submitted at"]) - new Date(a["Submitted at"]));
        buildFilterOptions();
        applyFilters();
      })
      .catch(err => console.error("Erreur API :", err));

    function buildFilterOptions() {
      const cities = new Set();
      const states = new Set();

      allDonations.forEach(item => {
        const city = (item["Ville / Code postal"] || "").trim();
        const state = (item["État de l’objet"] || "").trim();

        if (city) cities.add(city);
        if (state) states.add(state);
      });

      [...cities].sort().forEach(city => {
        const opt = document.createElement("option");
        opt.value = city;
        opt.textContent = city;
        filterCity.appendChild(opt);
      });

      [...states].sort().forEach(state => {
        const opt = document.createElement("option");
        opt.value = state;
        opt.textContent = state;
        filterState.appendChild(opt);
      });
    }

    function applyFilters() {
      filteredDonations = allDonations.filter(item => {
        const type = (item["Type d’objet"] || "").toLowerCase();
        const city = (item["Ville / Code postal"] || "").trim();
        const state = (item["État de l’objet"] || "").trim();

        if (currentType !== "all" && !type.includes(currentType)) return false;
        if (currentCity !== "all" && city !== currentCity) return false;
        if (currentState !== "all" && state !== currentState) return false;

        return true;
      });

      currentPage = 1;
      renderDonations();
      updatePagination();
    }

    function renderDonations() {
      donationsContainer.innerHTML = "";

      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageItems = filteredDonations.slice(start, end);

      pageItems.forEach(item => {
        const card = document.createElement("div");
        card.className = "don-card";

        const photos = (item["Photo de l’objet (upload)"] || "")
          .split(",")
          .map(p => p.trim())
          .filter(p => p);

        const photo = photos[0] || "";
        const type = item["Type d’objet"] || "Objet";
        const etat = item["État de l’objet"] || "Non précisé";
        const ville = item["Ville / Code postal"] || "Ville inconnue";
        const contact = item["Email ou téléphone"] || "";
        const submitted = item["Submitted at"] || "";

        const metaPieces = [];
        if (ville) metaPieces.push(ville);
        if (etat) metaPieces.push(etat);

        const metaText = metaPieces.join(" • ");

        card.innerHTML = `
          <div class="don-photo-wrapper">
            <img src="${photo}" alt="Photo du don" class="don-photo">
            ${photos.length > 1 ? `<div class="photo-badge">${photos.length} photos</div>` : ""}
          </div>
          <h3>${type}</h3>
          <div class="don-meta">${metaText}</div>
          ${submitted ? `<p><span style="font-size:12px;color:#999;">Ajouté le ${submitted}</span></p>` : ""}
          <div class="don-actions">
            <button class="btn btn-ghost btn-details">Détails</button>
            <button class="btn btn-primary btn-contact">Contacter</button>
          </div>
        `;

        // Clic sur l'image → modal
        card.querySelector(".don-photo-wrapper").addEventListener("click", () => {
          openModal(item, photos);
        });

        // Bouton Détails → modal
        card.querySelector(".btn-details").addEventListener("click", () => {
          openModal(item, photos);
        });

        // Bouton Contacter → alert simple
        card.querySelector(".btn-contact").addEventListener("click", () => {
          if (contact) {
            alert("Contact du donneur : " + contact);
          } else {
            alert("Contact non renseigné.");
          }
        });

        donationsContainer.appendChild(card);
      });

      if (filteredDonations.length === 0) {
        donationsContainer.innerHTML = "<p>Aucun don ne correspond à ces filtres pour le moment.</p>";
      }
    }

    function updatePagination() {
      const totalPages = Math.max(1, Math.ceil(filteredDonations.length / pageSize));
      pageInfo.textContent = `Page ${currentPage} / ${totalPages}`;
      prevPageBtn.disabled = currentPage === 1;
      nextPageBtn.disabled = currentPage === totalPages;
    }

    // Filtres type
    document.querySelectorAll(".chip[data-type]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".chip[data-type]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentType = btn.dataset.type;
        applyFilters();
      });
    });

    // Filtres ville / état
    filterCity.addEventListener("change", () => {
      currentCity = filterCity.value;
      applyFilters();
    });

    filterState.addEventListener("change", () => {
      currentState = filterState.value;
      applyFilters();
    });

    // Pagination
    prevPageBtn.addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        renderDonations();
        updatePagination();
      }
    });

    nextPageBtn.addEventListener("click", () => {
      const totalPages = Math.max(1, Math.ceil(filteredDonations.length / pageSize));
      if (currentPage < totalPages) {
        currentPage++;
        renderDonations();
        updatePagination();
      }
    });

    // Modal
    function openModal(item, photos) {
      currentPhotos = photos.length ? photos : [""];
      currentPhotoIndex = 0;
      currentContact = item["Email ou téléphone"] || "";

      modalTitle.textContent = item["Type d’objet"] || "Détail du don";
      updateModalPhoto();

      modalDetails.innerHTML = `
        <p><span class="label">Type :</span> ${item["Type d’objet"] || "Non précisé"}</p>
        <p><span class="label">État :</span> ${item["État de l’objet"] || "Non précisé"}</p>
        <p><span class="label">Ville / Code postal :</span> ${item["Ville / Code postal"] || "Non précisé"}</p>
        <p><span class="label">Ajouté le :</span> ${item["Submitted at"] || "Non précisé"}</p>
        <p><span class="label">Contact :</span> ${currentContact || "Non renseigné"}</p>
      `;

      modalBackdrop.style.display = "flex";
    }

    function updateModalPhoto() {
      const total = currentPhotos.length;
      const src = currentPhotos[currentPhotoIndex] || "";
      modalImage.src = src;
      photoIndicator.textContent = `${currentPhotoIndex + 1} / ${total}`;
    }

    function closeModal() {
      modalBackdrop.style.display = "none";
    }

    modalClose.addEventListener("click", closeModal);
    modalCloseBottom.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", (e) => {
      if (e.target === modalBackdrop) closeModal();
    });

    prevPhotoBtn.addEventListener("click", () => {
      if (currentPhotos.length <= 1) return;
      currentPhotoIndex = (currentPhotoIndex - 1 + currentPhotos.length) % currentPhotos.length;
      updateModalPhoto();
    });

    nextPhotoBtn.addEventListener("click", () => {
      if (currentPhotos.length <= 1) return;
      currentPhotoIndex = (currentPhotoIndex + 1) % currentPhotos.length;
      updateModalPhoto();
    });

    modalContactBtn.addEventListener("click", () => {
      if (currentContact) {
        alert("Contact du donneur : " + currentContact);
      } else {
        alert("Contact non renseigné.");
      }
    });
  </script>

</body>
</html>
