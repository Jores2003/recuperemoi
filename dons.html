<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz3_MLXMxqpEnmYQExnE9dizJYx15eBseREFSldQW2LAg5ostMvmqh1_gncntfMx1c1bw/exec";

fetch(API_URL)
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById("donations");
    container.innerHTML = "";

    data.forEach(item => {
      const card = document.createElement("div");
      card.className = "don-card";

      const photo = item["Photo de l’objet (upload)"] || "";
      const type = item["Type d’objet"] || "Objet";
      const etat = item["État de l’objet"] || "Non précisé";
      const ville = item["Ville / Code postal"] || "Ville inconnue";

      card.innerHTML = `
        <img src="${photo}" alt="Photo du don" class="don-photo">
        <h3>${type}</h3>
        <p><strong>État :</strong> ${etat}</p>
        <p><strong>Ville :</strong> ${ville}</p>
      `;

      container.appendChild(card);
    });
  })
  .catch(error => {
    console.error("Erreur API :", error);
  });
</script>
