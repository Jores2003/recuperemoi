<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les dons disponibles</title>

  <style>
    :root {
      --primary: #1f7a8c;
      --primary-light: #e3f2f5;
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --text-main: #222;
      --text-muted: #666;
      --shadow-soft: 0 8px 20px rgba(0,0,0,0.06);
      --radius-card: 14px;
      --radius-img: 12px;
    }

    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text-main);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 24px;
      color: var(--text-muted);
    }

    .filters-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
    }

    .chip {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }

    .chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    #citySearch {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 220px;
    }

    .suggestions {
      position: absolute;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
      width: 220px;
      display: none;
      z-index: 1000;
    }

    .suggestions div {
      padding: 8px;
      cursor: pointer;
    }

    .suggestions div:hover {
      background: #f0f0f0;
    }

    #donations {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .don-card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      padding: 14px;
      display: flex;
      flex-direction: column;
      transition: 0.2s;
    }

    .don-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.08);
    }

    .don-photo-wrapper {
      border-radius: var(--radius-img);
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 10px;
      position: relative;
    }

    .don-photo {
      width: 100%;
      height: 190px;
      object-fit: cover;
      transition: 0.25s;
    }

    .don-photo-wrapper:hover .don-photo {
      transform: scale(1.03);
    }

    .photo-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 3px 7px;
      font-size: 11px;
      border-radius: 999px;
    }

    .don-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .don-actions {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .btn {
      padding: 7px 12px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      color: var(--primary);
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: #fff;
      border-radius: 16px;
      max-width: 720px;
      width: 95%;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }

    .modal-body {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 12px;
      padding: 16px;
    }

    @media(max-width:700px){
      .modal-body { grid-template-columns: 1fr; }
    }

    .carousel img {
      width: 100%;
      height: 320px;
      object-fit: contain;
      background: #000;
    }

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      cursor: pointer;
    }

    #prevPhoto { left: 10px; }
    #nextPhoto { right: 10px; }

    .carousel-indicator {
      position: absolute;
      bottom: 8px;
      right: 10px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: 11px;
    }
  </style>
</head>

<body>

  <h1>Les dons disponibles</h1>
  <p class="subtitle">Découvrez les objets donnés près de chez vous.</p>

  <div class="filters-bar">
    <button class="chip active" data-type="all">Tous</button>
    <button class="chip" data-type="meuble">Meubles</button>
    <button class="chip" data-type="jouet">Jouets</button>
    <button class="chip" data-type="textile">Textile</button>
    <button class="chip" data-type="électroménager">Électroménager</button>
    <button class="chip" data-type="déco">Décoration</button>
    <button class="chip" data-type="autre">Autre</button>

    <input type="text" id="citySearch" placeholder="Rechercher une ville..." autocomplete="off">
    <div id="citySuggestions" class="suggestions"></div>

    <select id="filterState">
      <option value="all">Tous les états</option>
    </select>
  </div>

  <div id="donations"></div>

  <div class="pagination">
    <button id="prevPage">&lt;</button>
    <span id="pageInfo">Page 1</span>
    <button id="nextPage">&gt;</button>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-body">
        <div class="carousel">
          <img id="modalImage" src="">
          <button class="carousel-btn" id="prevPhoto">&#8249;</button>
          <button class="carousel-btn" id="nextPhoto">&#8250;</button>
          <div class="carousel-indicator" id="photoIndicator">1 / 1</div>
        </div>

        <div id="modalDetails"></div>
      </div>

      <div style="padding:12px; display:flex; justify-content:flex-end; gap:10px;">
        <button class="btn btn-ghost" id="modalContact">Contacter</button>
        <button class="btn btn-primary" id="modalClose">Fermer</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz3_MLXMxqpEnmYQExnE9dizJYx15eBseREFSldQW2LAg5ostMvmqh1_gncntfMx1c1bw/exec";

    let communes = [];
    let all = [];
    let filtered = [];
    let currentType = "all";
    let currentCity = "all";
    let currentState = "all";
    let currentPage = 1;
    const pageSize = 8;

    let photos = [];
    let photoIndex = 0;
    let contactInfo = "";

    fetch("communes.json")
      .then(r => r.json())
      .then(data => communes = data);

    function normalize(item) {
      return {
        type: item["Type d’objet"] || "",
        state: item["État de l’objet"] || "",
        city: String(item["Ville / Code postal"] || "").trim(),
        photos: item["Photo de l’objet (upload)"]
          ? item["Photo de l’objet (upload)"].split(",").map(p => p.trim())
          : [],
        contact: item["Email ou téléphone"] || "",
        submitted: item["Submitted at"] || ""
      };
    }

    fetch(API_URL)
      .then(r => r.json())
      .then(data => {
        all = data.map(normalize)
                 .sort((a,b) => new Date(b.submitted) - new Date(a.submitted));

        buildStateFilter();
        applyFilters();
      });

    function buildStateFilter() {
      const states = new Set();
      all.forEach(d => { if (d.state) states.add(d.state); });

      [...states].sort().forEach(s => {
        filterState.innerHTML += `<option value="${s}">${s}</option>`;
      });
    }

    function applyFilters() {
      filtered = all.filter(d => {
        if (currentType !== "all" && !d.type.toLowerCase().includes(currentType)) return false;
        if (currentCity !== "all" && !d.city.toLowerCase().includes(currentCity.toLowerCase())) return false;
        if (currentState !== "all" && d.state !== currentState) return false;
        return true;
      });

      currentPage = 1;
      render();
      updatePagination();
    }

    function render() {
      const container = document.getElementById("donations");
      container.innerHTML = "";

      const start = (currentPage - 1) * pageSize;
      const pageItems = filtered.slice(start, start + pageSize);

      pageItems.forEach(item => {
        const card = document.createElement("div");
        card.className = "don-card";

        const photo = item.photos[0] || "https://via.placeholder.com/300x200?text=Pas+de+photo";

        card.innerHTML = `
          <div class="don-photo-wrapper">
            <img src="${photo}" class="don-photo">
            ${item.photos.length > 1 ? `<div class="photo-badge">${item.photos.length} photos</div>` : ""}
          </div>

          <h3>${item.type}</h3>
          <div class="don-meta">${item.city} • ${item.state}</div>
          <p style="font-size:12px;color:#999;">Ajouté le ${new Date(item.submitted).toLocaleDateString("fr-FR")}</p>

          <div class="don-actions">
            <button class="btn btn-ghost btn-details">Détails</button>
            <button class="btn btn-primary btn-contact">Contacter</button>
          </div>
        `;

        card.querySelector(".don-photo-wrapper").onclick = () => openModal(item);
        card.querySelector(".btn-details").onclick = () => openModal(item);
        card.querySelector(".btn-contact").onclick = () => alert("Contact : " + item.contact);

        container.appendChild(card);
      });
    }

    function updatePagination() {
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      pageInfo.textContent = `Page ${currentPage} / ${totalPages}`;
      prevPage.disabled = currentPage === 1;
      nextPage.disabled = currentPage === totalPages;
    }

    prevPage.onclick = () => { currentPage--; render(); updatePagination(); };
    nextPage.onclick = () => { currentPage++; render(); updatePagination(); };

    document.querySelectorAll(".chip").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".chip").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentType = btn.dataset.type;
        applyFilters();
      };
    });

    filterState.onchange = () => { currentState = filterState.value; applyFilters(); };

    const cityInput = document.getElementById("citySearch");
    const suggestions = document.getElementById("citySuggestions");

    cityInput.addEventListener("input", () => {
      const q = cityInput.value.toLowerCase().trim();
      if (!q) {
        suggestions.style.display = "none";
        return;
      }

      const results = communes
        .filter(c => c.nom.toLowerCase().startsWith(q))
        .slice(0, 10);

      suggestions.innerHTML = results
        .map(c => `<div data-city="${c.nom}">${c.nom} (${c.codesPostaux[0]})</div>`)
        .join("");

      suggestions.style.display = results.length ? "block" : "none";
    });

    suggestions.addEventListener("click", (e) => {
      if (e.target.dataset.city) {
        cityInput.value = e.target.dataset.city;
        currentCity = e.target.dataset.city;
        suggestions.style.display = "none";
        applyFilters();
      }
    });

    function openModal(item) {
      photos = item.photos.length ? item.photos : ["https://via.placeholder.com/600x400?text=Pas+de+photo"];
      photoIndex = 0;
      contactInfo = item.contact;

      updateModalPhoto();

      modalDetails.innerHTML = `
        <p><strong>Type :</strong> ${item.type}</p>
        <p><strong>État :</strong> ${item.state}</p>
        <p><strong>Ville :</strong> ${item.city}</p>
        <p><strong>Ajouté le :</strong> ${new Date(item.submitted).toLocaleDateString("fr-FR")}</p>
        <p><strong>Contact :</strong> ${item.contact}</p>
      `;

      modalBackdrop.style.display = "flex";
    }

    function updateModalPhoto() {
      modalImage.src = photos[photoIndex];
      photoIndicator.textContent = `${photoIndex + 1} / ${photos.length}`;
    }

    prevPhoto.onclick = () => {
      photoIndex = (photoIndex - 1 + photos.length) % photos.length;
      updateModalPhoto();
    };

    nextPhoto.onclick = () => {
      photoIndex = (photoIndex + 1) % photos.length;
      updateModalPhoto();
    };

    modalClose.onclick = () => modalBackdrop.style.display = "none";
    modalContact.onclick = () => alert("Contact : " + contactInfo);
    modalBackdrop.onclick = e => { if (e.target === modalBackdrop) modalBackdrop.style.display = "none"; };
  </script>

</body>
</html>
