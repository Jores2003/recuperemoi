<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voir les dons</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Filtres */
    #filters {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    #filters button {
      padding: 8px 15px;
      border: none;
      background: #ddd;
      border-radius: 5px;
      cursor: pointer;
    }

    #filters button.active {
      background: #333;
      color: white;
    }

    /* Grille des dons */
    #donations {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .don-card {
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .don-photo {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .don-card h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .don-card p {
      margin: 5px 0;
      font-size: 14px;
    }

    /* Bouton Voir plus */
    #loadMore {
      display: block;
      margin: 30px auto;
      padding: 10px 20px;
      background: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Les dons disponibles</h1>

  <!-- Filtres -->
  <div id="filters">
    <button data-filter="all" class="active">Tous</button>
    <button data-filter="meuble">Meubles</button>
    <button data-filter="jouet">Jouets</button>
    <button data-filter="textile">Textile</button>
    <button data-filter="électroménager">Électroménager</button>
    <button data-filter="déco">Décoration</button>
    <button data-filter="autre">Autre</button>
  </div>

  <!-- Conteneur des dons -->
  <div id="donations"></div>

  <!-- Bouton Voir plus -->
  <button id="loadMore">Voir plus</button>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz3_MLXMxqpEnmYQExnE9dizJYx15eBseREFSldQW2LAg5ostMvmqh1_gncntfMx1c1bw/exec";

    let allDonations = [];
    let visibleCount = 6; // nombre de dons affichés au début
    let currentFilter = "all";

    // Charger les données
    fetch(API_URL)
      .then(response => response.json())
      .then(data => {
        // Trier par date (plus récent en premier)
        allDonations = data.sort((a, b) => new Date(b["Submitted at"]) - new Date(a["Submitted at"]));
        renderDonations();
      });

    // Afficher les dons
    function renderDonations() {
      const container = document.getElementById("donations");
      container.innerHTML = "";

      const filtered = allDonations.filter(item => {
        if (currentFilter === "all") return true;
        return item["Type d’objet"].toLowerCase().includes(currentFilter);
      });

      filtered.slice(0, visibleCount).forEach(item => {
        const card = document.createElement("div");
        card.className = "don-card";

        const photos = item["Photo de l’objet (upload)"]?.split(",") || [];
        const photo = photos[0] || "";

        const type = item["Type d’objet"] || "Objet";
        const etat = item["État de l’objet"] || "Non précisé";
        const ville = item["Ville / Code postal"] || "Ville inconnue";
        const contact = item["Email ou téléphone"] || "";

        card.innerHTML = `
          <img src="${photo}" alt="Photo du don" class="don-photo">
          <h3>${type}</h3>
          <p><strong>État :</strong> ${etat}</p>
          <p><strong>Ville :</strong> ${ville}</p>
          <button onclick="alert('Contact du donneur : ${contact}')">Contacter le donneur</button>
        `;

        container.appendChild(card);
      });
    }

    // Filtres
    document.querySelectorAll("#filters button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelector("#filters .active").classList.remove("active");
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        visibleCount = 6;
        renderDonations();
      });
    });

    // Voir plus
    document.getElementById("loadMore").addEventListener("click", () => {
      visibleCount += 6;
      renderDonations();
    });
  </script>

</body>
</html>
