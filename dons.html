<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Voir les dons - RecupèreMoi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background:#F3F7F4;
      color:#1F2D1F;
    }

    nav {
      background:#276749;
      padding:12px 0;
      text-align:center;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);
    }

    nav a {
      color:white;
      text-decoration:none;
      margin:0 18px;
      font-weight:600;
      font-size:1.05em;
      transition:0.2s;
    }

    nav a:hover {
      color:#C6F6D5;
    }

    header {
      background:#2F855A;
      color:white;
      padding:40px 20px;
      text-align:center;
      border-bottom: 6px solid #276749;
    }

    h1 {
      margin:0;
      font-size:2.2em;
      font-weight:700;
    }

    .container {
      max-width:1100px;
      margin:40px auto;
      padding:0 20px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
      gap:20px;
    }

    .card {
      background:white;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
      overflow:hidden;
      border-left:6px solid #2F855A;
      transition:0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
    }

    .card img {
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .card-content {
      padding:15px;
    }

    .card h3 {
      margin:0 0 10px;
      color:#276749;
    }

    .btn-contact {
      display:inline-block;
      margin-top:10px;
      padding:10px 18px;
      background:#2F855A;
      color:white;
      text-decoration:none;
      border-radius:6px;
      font-weight:bold;
      transition:0.2s;
    }

    .btn-contact:hover {
      background:#276749;
    }
  </style>
</head>

<body>

<nav>
  <a href="index.html">Accueil</a>
  <a href="deposer.html">Déposer un objet</a>
  <a href="dons.html">Voir les dons</a>
  <a href="apropos.html">À propos</a>
  <a href="contact.html">Contact</a>
</nav>

<header>
  <h1>Voir les dons disponibles</h1>
  <p>Les dons apparaissent automatiquement dès qu’un utilisateur remplit le formulaire.</p>
</header>

<div class="container">
  <div id="donGrid" class="grid"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwZmP_KL9ZA9BZFJjhUEHYqqeAkmglU5AUbmLBU2_kbW_uTW0Vt2NNpAllx2XS8O8sQFw/exec";

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      const grid = document.getElementById("donGrid");

      data.forEach(don => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img src="${don['Photo']}" alt="Objet">
          <div class="card-content">
            <h3>${don['Nom de l’objet']}</h3>
            <p>Catégorie : ${don['Catégorie']}</p>
            <p>Ville : ${don['Ville']}</p>
            <a href="mailto:${don['Email']}" class="btn-contact">Contacter le donneur</a>
          </div>
        `;

        grid.appendChild(card);
      });
    });
</script>

</body>
</html>
