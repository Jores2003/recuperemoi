<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contact - RecupèreMoi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background:#F3F7F4;
      color:#1F2D1F;
    }

    nav {
      background:#276749;
      padding:12px 0;
      text-align:center;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);
    }

    nav a {
      color:white;
      text-decoration:none;
      margin:0 18px;
      font-weight:600;
      font-size:1.05em;
      transition:0.2s;
    }

    nav a:hover {
      color:#C6F6D5;
    }

    header {
      background:#2F855A;
      color:white;
      padding:40px 20px;
      text-align:center;
      border-bottom: 6px solid #276749;
    }

    h1 {
      margin:0;
      font-size:2.2em;
      font-weight:700;
    }

    .container {
      max-width:900px;
      margin:40px auto;
      padding:0 20px;
    }

    .box {
      background:white;
      padding:25px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
      border-left:6px solid #2F855A;
    }

    label {
      font-weight:600;
      display:block;
      margin-top:15px;
    }

    input, textarea {
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:6px;
      border:1px solid #ccc;
      font-size:1em;
    }

    textarea {
      height:150px;
      resize:vertical;
    }

    .btn {
      margin-top:20px;
      display:inline-block;
      padding:12px 25px;
      background:#2F855A;
      color:white;
      text-decoration:none;
      border-radius:6px;
      font-weight:bold;
      font-size:1.1em;
      transition:0.2s;
      border:none;
      cursor:pointer;
    }

    .btn:hover {
      background:#276749;
    }

    footer {
      text-align:center;
      padding:25px;
      margin-top:40px;
      background:#E8EEE9;
      border-top:4px solid #C6D5D0;
      font-size:0.9em;
    }
  </style>
</head>

<body>

<!-- MENU -->
<nav>
  <a href="index.html">Accueil</a>
  <a href="deposer.html">Déposer un objet</a>
  <a href="dons.html">Voir les dons</a>
  <a href="apropos.html">À propos</a>
  <a href="contact.html">Contact</a>
</nav>

<header>
  <h1>Contact</h1>
  <p>Une question, une suggestion ou un partenariat ? Écrivez-nous.</p>
</header>

<div class="container">
  <div class="box">

    <h2>📩 Formulaire de contact</h2>
    <p>Remplissez ce formulaire et nous vous répondrons rapidement.</p>

    <form action="mailto:recuperemoi.contact@gmail.com" method="POST" enctype="text/plain">
      <label>Votre nom</label>
      <input type="text" name="Nom" required>

      <label>Votre email</label>
      <input type="email" name="Email" required>

      <label>Votre message</label>
      <textarea name="Message" required></textarea>

      <button type="submit" class="btn">Envoyer</button>
    </form>

  </div>
</div>

<footer>
  <p>© 2026 RecupèreMoi – Plateforme de dons gratuits</p>
</footer>

</body>
</html>
